<!DOCTYPE html>
<html>
<head>
    <title>Edit Record</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Edit Record</h1>
    <form method="POST" action="{{ url_for('edit_record', id=record.id) }}">
        <label for="band_name">Band Name:</label>
        <input type="text" id="band_name" name="band_name" value="{{ record.band_name }}" required>
        <br>

        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ record.title }}" required>
        <br>

        <label for="year">Year:</label>
        <input type="number" id="year" name="year" value="{{ record.year }}" required>
        <br>

        <label for="format">Format:</label>
        <select id="format" name="format" required>
            <option value="CD" {% if record.format == 'CD' %}selected{% endif %}>CD</option>
            <option value="LP" {% if record.format == 'LP' %}selected{% endif %}>LP</option>
            <option value="EP" {% if record.format == 'EP' %}selected{% endif %}>EP</option>
        </select>
        <br>

        <button type="submit">Update Record</button>
    </form>
    <br>
    <a href="{{ url_for('index') }}">Back to Collection</a>
</body>

  <!-- Link to the JavaScript file -->
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</html>
